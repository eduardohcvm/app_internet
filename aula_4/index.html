<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário Acessível</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Cadastro de Usuário</h1>

  <nav>
    <ul>
      <li><a href="#formulario">Formulário</a></li>
      <li><a href="#video">Vídeo</a></li>
    </ul>
  </nav>
</header>

<main id="conteudo">

  <!-- FORMULÁRIO -->
  <section id="formulario">
    <h2>Preencha seus dados</h2>

    <form novalidate>

      <div class="campo">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required>
        <span class="erro">Informe seu nome</span>
      </div>

      <div class="campo">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <span class="erro">Email inválido</span>
      </div>

      <div class="campo">
        <label for="senha">Senha (mín. 6 caracteres)</label>
        <input type="password" id="senha" name="senha"
               pattern=".{6,}" required>
        <span class="erro">Mínimo 6 caracteres</span>
      </div>

      <button type="submit">Enviar</button>

    </form>
  </section>

  <!-- VÍDEO -->
  <section id="video">
    <h2>Vídeo Explicativo</h2>

    <video controls width="400">
      <source src="video.mp4" type="video/mp4">
      <source src="video.webm" type="video/webm">

      <track src="legendas.vtt"
             kind="subtitles"
             srclang="pt"
             label="Português">

      Seu navegador não suporta vídeo.
    </video>

  </section>

</main>

<footer>
  <p>&copy; 2026 - Projeto Acessível</p>
</footer>

<script>
  // Validação simples acessível
  const form = document.querySelector("form");

  form.addEventListener("submit", function (e) {
    let valido = true;

    form.querySelectorAll("input").forEach(input => {
      const erro = input.nextElementSibling;

      if (!input.checkValidity()) {
        erro.style.display = "block";
        input.setAttribute("aria-invalid", "true");
        valido = false;
      } else {
        erro.style.display = "none";
        input.removeAttribute("aria-invalid");
      }
    });

    if (!valido) {
      e.preventDefault();
    }
  });
</script>

</body>
</html>
